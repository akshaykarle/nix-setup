name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake-check:
    name: Validate flake.lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/flake-checker-action@main

  check-linux:
    name: Build Linux configurations
    runs-on: ubuntu-latest
    needs: [flake-check]
    steps:
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf \
            "$AGENT_TOOLSDIRECTORY" \
            /opt/google/chrome \
            /opt/microsoft/msedge \
            /opt/microsoft/powershell \
            /opt/pipx \
            /usr/lib/mono \
            /usr/local/julia* \
            /usr/local/lib/android \
            /usr/local/lib/node_modules \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /usr/share/swift
          sudo docker image prune --all --force
          df -h /
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run flake checks (x86_64-linux)
        run: nix flake check --print-build-logs

  check-darwin:
    name: Build Darwin configurations
    runs-on: macos-15
    needs: [flake-check]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-platforms = x86_64-darwin
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run flake checks (aarch64-darwin)
        run: nix flake check --print-build-logs
      - name: Build x86_64-darwin system
        run: nix build .#checks.x86_64-darwin.akshaykarle_darwin --print-build-logs
      - name: Build x86_64-darwin home
        run: nix build .#checks.x86_64-darwin.akshaykarle_home --print-build-logs
