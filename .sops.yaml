# sops-nix configuration
# To add a host key, run on the NixOS host:
#   nix-shell -p ssh-to-age --run 'cat /etc/ssh/ssh_host_ed25519_key.pub | ssh-to-age'
# Then add the resulting age public key below.
keys:
  - &asus age19jf9p3pkgrwm0suh4mvqu50s84p6269324jhaulypmk7hd7v5yasgggs4s
  - &intel REPLACE_WITH_INTEL_HOST_AGE_PUBLIC_KEY

creation_rules:
  - path_regex: secrets/passwords\.yaml$
    key_groups:
      - age:
          - *asus
          - *intel
